<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Snitap</title>

  <link rel="stylesheet" href="./assets/css/index.css">

  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,500;1,14..32,500&family=Montserrat:ital,wght@0,500;1,500&family=Syne:wght@700&display=swap" rel="stylesheet">
</head>
<body>
  <header>
    <a href="#" title="Home">
      <img src="./assets/icons/logo.svg" alt="Logo">
    </a>
    <a href="#" title="Carrinho de Compras">
      <img src="./assets/icons/shopping-bag.svg" alt="Bolsa de shopping">
      <span>1</span>
    </a>
  </header>

  <section class="hero">
    <!-- lado esquerdo -->
    <div>
      <h1>
        Snitap, sua vida mais
        <div>
          <span>radical</span>
          <span>divertida</span>
          <span>saudável</span>
          <span>radical</span> <!-- para evitar que ele volte tudo ao final do infinite -->
        </div>
      </h1>

      <div class="buttons">
        <a href="#" class="button buy shadow">
          <img src="./assets/icons/shopping-bag.svg" alt="Bolsa de shopping">
          COMPRAR AGORA
        </a>

        <a href="#" class="button play">
          <span class="shadow">
            <img src="./assets/icons/play.svg" alt="Play">
          </span>
          VEJA EM AÇÃO
        </a>
      </div>
    </div>

    <!-- lado direito -->
    <div>
      <div class="content">
        <img src="./assets/hero/ellipse.svg" alt="Elipse">
        <img src="./assets/hero/patins.png" alt="Patins">
        <img src="./assets/hero/stars-1.svg" alt="Estrelas">
        <img src="./assets/hero/stars-2.svg" alt="Estrelas">
      </div>
    </div>
  </section>
</body>
</html>
